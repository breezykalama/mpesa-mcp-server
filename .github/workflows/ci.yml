name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Compile Python modules
        run: python -m compileall app tests scripts alembic

      - name: Run tests
        run: uv run pytest

      - name: Run ruff
        run: uv run ruff check app tests scripts alembic

      - name: Run mypy
        run: uv run mypy app tests scripts
